<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publisher Account — Inkstain</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#1B2A3B;--ink-dark:#0f1e2d;--parch:#f5f2eb;--parch-dk:#ece8dc;--amber:#c8956b;--muted:rgba(27,42,59,0.32);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--parch);color:var(--ink);font-family:'EB Garamond',Georgia,serif;font-size:18px;line-height:1.7;min-height:100vh;}
    nav{display:flex;justify-content:space-between;align-items:center;padding:1.6rem 4rem;border-bottom:.5px solid rgba(27,42,59,.12);}
    .nav-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:24px;color:var(--ink);text-decoration:none;letter-spacing:-.5px;}
    .nav-logo span{color:var(--amber);}
    .nav-back{font-size:14px;color:var(--muted);text-decoration:none;}
    .page{max-width:560px;margin:0 auto;padding:4rem 2rem 6rem;}
    .eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--amber);margin-bottom:1rem;}
    .title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,40px);font-weight:700;line-height:1.1;letter-spacing:-1px;margin-bottom:.75rem;}
    .sub{font-size:17px;color:var(--muted);margin-bottom:2rem;}
    .trial-note{background:var(--parch-dk);border-left:2px solid var(--amber);padding:1rem 1.25rem;margin-bottom:2rem;font-size:15px;color:var(--ink);}
    .field{margin-bottom:1.5rem;}
    .field-label{display:block;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink);opacity:.55;margin-bottom:.5rem;}
    .field-input,.field-select{width:100%;padding:13px 16px;font-family:'EB Garamond',serif;font-size:17px;border:.5px solid rgba(27,42,59,.28);background:var(--parch);color:var(--ink);outline:none;transition:border-color .2s;appearance:none;}
    .field-input:focus,.field-select:focus{border-color:rgba(27,42,59,.65);}
    .field-input::placeholder{color:rgba(27,42,59,.28);}
    .divider{height:.5px;background:rgba(27,42,59,.1);margin:2rem 0;}
    .btn-submit{width:100%;background:var(--ink);color:var(--parch);font-family:'EB Garamond',serif;font-size:19px;padding:16px;border:none;cursor:pointer;letter-spacing:.5px;margin-top:.5rem;}
    .btn-submit:disabled{opacity:.4;cursor:not-allowed;}
    .form-error{display:none;background:#fdf0ec;border:.5px solid rgba(200,80,50,.2);padding:.875rem 1.25rem;margin-bottom:1.5rem;font-size:15px;color:#8b3020;}
    .link{color:var(--amber);text-decoration:none;}
    @media(max-width:600px){nav{padding:1.2rem 1.5rem;}.page{padding:3rem 1.5rem 4rem;}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Ink<span>stain</span></a>
  <a href="/publishers" class="nav-back">← publisher info</a>
</nav>
<div class="page">
  <p class="eyebrow">Publisher account</p>
  <h1 class="title">Create your account.</h1>
  <p class="sub">30-day free trial. No credit card required.</p>
  <div class="trial-note">✦ Full dashboard access, unlimited contributor invites, and certificate verification — free for 30 days.</div>
  <div class="form-error" id="form-error"></div>
  <form id="pub-form" onsubmit="handleSignup(event)">
    <div class="field">
      <label class="field-label" for="f-org">Publication or organization</label>
      <input type="text" id="f-org" class="field-input" placeholder="e.g. Daily Mail, The Atlantic, Penguin Random House" required>
    </div>
    <div class="field">
      <label class="field-label" for="f-type">Type</label>
      <select id="f-type" class="field-select">
        <option value="newspaper">Newspaper / news site</option>
        <option value="magazine">Magazine</option>
        <option value="publisher">Book publisher</option>
        <option value="agency">Literary agency</option>
        <option value="university">University / institution</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label class="field-label" for="f-name">Your name</label>
      <input type="text" id="f-name" class="field-input" placeholder="Your full name" required>
    </div>
    <div class="field">
      <label class="field-label" for="f-role">Your title</label>
      <input type="text" id="f-role" class="field-input" placeholder="e.g. Editor, Managing Editor, Head of Content">
    </div>
    <div class="field">
      <label class="field-label" for="f-email">Work email</label>
      <input type="email" id="f-email" class="field-input" placeholder="you@publication.com" required>
    </div>
    <div class="field">
      <label class="field-label" for="f-password">Password</label>
      <input type="password" id="f-password" class="field-input" placeholder="At least 8 characters" required minlength="8">
    </div>
    <div class="divider"></div>
    <button type="submit" class="btn-submit" id="submit-btn">Create publisher account</button>
    <p style="text-align:center;margin-top:1.25rem;font-size:15px;color:var(--muted);">
      Already have an account? <a href="/publishers/dashboard" class="link">Sign in →</a>
    </p>
  </form>
</div>
<script>
async function handleSignup(e) {
  e.preventDefault();
  const payload = {
    org: document.getElementById('f-org').value.trim(),
    type: document.getElementById('f-type').value,
    name: document.getElementById('f-name').value.trim(),
    role: document.getElementById('f-role').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    password: document.getElementById('f-password').value
  };
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('form-error').style.display = 'none';
  try {
    const res = await fetch('/api/publishers/signup', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      localStorage.setItem('inkstain_pub_session', data.token);
      localStorage.setItem('inkstain_pub', JSON.stringify(data.publisher));
      window.location.href = '/publishers/dashboard';
    } else {
      const el = document.getElementById('form-error');
      el.textContent = data.error || 'Something went wrong.';
      el.style.display = 'block';
      document.getElementById('submit-btn').disabled = false;
    }
  } catch(err) {
    document.getElementById('form-error').textContent = 'Could not connect. Please try again.';
    document.getElementById('form-error').style.display = 'block';
    document.getElementById('submit-btn').disabled = false;
  }
}
</script>
</body>
</html>

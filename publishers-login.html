<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publisher Sign In — Inkstain</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#1B2A3B;--ink-dark:#0f1e2d;--parch:#f5f2eb;--parch-dk:#ece8dc;--amber:#c8956b;--muted:rgba(27,42,59,0.32);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--parch);color:var(--ink);font-family:'EB Garamond',Georgia,serif;font-size:18px;line-height:1.7;min-height:100vh;}
    nav{display:flex;justify-content:space-between;align-items:center;padding:1.6rem 4rem;border-bottom:.5px solid rgba(27,42,59,.12);}
    .nav-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:24px;color:var(--ink);text-decoration:none;letter-spacing:-.5px;}
    .nav-logo span{color:var(--amber);}
    .nav-back{font-size:14px;color:var(--muted);text-decoration:none;}
    .page{max-width:480px;margin:0 auto;padding:5rem 2rem 6rem;}
    .eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--amber);margin-bottom:1rem;}
    .title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,40px);font-weight:700;line-height:1.1;letter-spacing:-1px;margin-bottom:.75rem;}
    .sub{font-size:17px;color:var(--muted);margin-bottom:2.5rem;}
    .field{margin-bottom:1.5rem;}
    .field-label{display:block;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink);opacity:.55;margin-bottom:.5rem;}
    .field-input{width:100%;padding:13px 16px;font-family:'EB Garamond',serif;font-size:17px;border:.5px solid rgba(27,42,59,.28);background:var(--parch);color:var(--ink);outline:none;transition:border-color .2s;}
    .field-input:focus{border-color:rgba(27,42,59,.65);}
    .field-input::placeholder{color:rgba(27,42,59,.28);}
    .btn-submit{width:100%;background:var(--ink);color:var(--parch);font-family:'EB Garamond',serif;font-size:19px;padding:16px;border:none;cursor:pointer;letter-spacing:.5px;margin-top:.5rem;}
    .btn-submit:disabled{opacity:.4;cursor:not-allowed;}
    .form-error{display:none;background:#fdf0ec;border:.5px solid rgba(200,80,50,.2);padding:.875rem 1.25rem;margin-bottom:1.5rem;font-size:15px;color:#8b3020;}
    .form-success{display:none;background:#f0f8f0;border:.5px solid rgba(60,140,80,.2);padding:.875rem 1.25rem;margin-bottom:1.5rem;font-size:15px;color:#2a6a35;}
    .link{color:var(--amber);text-decoration:none;}
    .forgot{display:block;text-align:right;font-size:14px;color:var(--muted);text-decoration:none;margin-top:.5rem;}
    .forgot:hover{color:var(--ink);}
    @media(max-width:600px){nav{padding:1.2rem 1.5rem;}.page{padding:3rem 1.5rem 4rem;}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Ink<span>stain</span></a>
  <a href="/publishers" class="nav-back">← publisher info</a>
</nav>
<div class="page">
  <p class="eyebrow">Publisher account</p>
  <h1 class="title">Welcome back.</h1>
  <p class="sub">Sign in to your publisher dashboard.</p>
  <div class="form-error" id="form-error"></div>
  <div class="form-success" id="form-success"></div>
  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="field">
      <label class="field-label" for="f-email">Work email</label>
      <input type="email" id="f-email" class="field-input" placeholder="you@publication.com" required autocomplete="email">
    </div>
    <div class="field">
      <label class="field-label" for="f-password">Password</label>
      <input type="password" id="f-password" class="field-input" placeholder="Your password" required autocomplete="current-password">
      <a href="/publishers/forgot-password" class="forgot">Forgot your password?</a>
    </div>
    <button type="submit" class="btn-submit" id="submit-btn">Sign in</button>
    <p style="text-align:center;margin-top:1.25rem;font-size:15px;color:var(--muted);">
      Don't have an account? <a href="/publishers/signup" class="link">Create one →</a>
    </p>
  </form>
</div>
<script>
const params = new URLSearchParams(location.search);
if (params.get('updated')) {
  const s = document.getElementById('form-success');
  s.textContent = 'Password updated. Please sign in.';
  s.style.display = 'block';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('form-error');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.style.display = 'none';
  try {
    const res = await fetch('/api/publishers/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        email: document.getElementById('f-email').value.trim(),
        password: document.getElementById('f-password').value
      })
    });
    const data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem('inkstain_pub_session', data.token);
      localStorage.setItem('inkstain_pub', JSON.stringify({ id: data.publisherId, name: data.name }));
      window.location.href = '/publishers/dashboard';
    } else {
      errEl.textContent = data.error || 'Invalid email or password.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  } catch(err) {
    errEl.textContent = 'Could not connect. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — Inkstain</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#1B2A3B;--ink-dark:#0f1e2d;--parch:#f5f2eb;--parch-dk:#ece8dc;--amber:#c8956b;--muted:rgba(27,42,59,0.32);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--parch);color:var(--ink);font-family:'EB Garamond',Georgia,serif;font-size:18px;line-height:1.7;min-height:100vh;}
    nav{display:flex;justify-content:space-between;align-items:center;padding:1.6rem 4rem;border-bottom:.5px solid rgba(27,42,59,.12);}
    .nav-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:24px;color:var(--ink);text-decoration:none;letter-spacing:-.5px;}
    .nav-logo span{color:var(--amber);}
    .nav-back{font-size:14px;color:var(--muted);text-decoration:none;}
    .page{max-width:480px;margin:0 auto;padding:5rem 2rem 6rem;}
    .eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--amber);margin-bottom:1rem;}
    .title{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,36px);font-weight:700;line-height:1.1;letter-spacing:-1px;margin-bottom:.75rem;}
    .sub{font-size:17px;color:var(--muted);margin-bottom:2.5rem;}
    .field{margin-bottom:1.5rem;}
    .field-label{display:block;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink);opacity:.55;margin-bottom:.5rem;}
    .field-input{width:100%;padding:13px 16px;font-family:'EB Garamond',serif;font-size:17px;border:.5px solid rgba(27,42,59,.28);background:var(--parch);color:var(--ink);outline:none;transition:border-color .2s;}
    .field-input:focus{border-color:rgba(27,42,59,.65);}
    .field-input::placeholder{color:rgba(27,42,59,.28);}
    .btn-submit{width:100%;background:var(--ink);color:var(--parch);font-family:'EB Garamond',serif;font-size:19px;padding:16px;border:none;cursor:pointer;letter-spacing:.5px;}
    .btn-submit:disabled{opacity:.4;cursor:not-allowed;}
    .form-error{display:none;background:#fdf0ec;border:.5px solid rgba(200,80,50,.2);padding:.875rem 1.25rem;margin-bottom:1.5rem;font-size:15px;color:#8b3020;}
    .invalid-token{text-align:center;padding:3rem;color:var(--muted);font-style:italic;}
    .link{color:var(--amber);text-decoration:none;}
    @media(max-width:600px){nav{padding:1.2rem 1.5rem;}.page{padding:3rem 1.5rem 4rem;}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Ink<span>stain</span></a>
  <a href="/publishers/login" class="nav-back">← back to sign in</a>
</nav>
<div class="page">
  <p class="eyebrow">Password reset</p>
  <h1 class="title">Set a new password.</h1>
  <p class="sub">Choose a new password for your publisher account.</p>
  <div class="form-error" id="form-error"></div>
  <div id="form-wrap">
    <form id="reset-form" onsubmit="handleReset(event)">
      <div class="field">
        <label class="field-label" for="f-password">New password</label>
        <input type="password" id="f-password" class="field-input" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <div class="field">
        <label class="field-label" for="f-confirm">Confirm password</label>
        <input type="password" id="f-confirm" class="field-input" placeholder="Repeat new password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Set new password</button>
    </form>
  </div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('form-wrap').innerHTML = '<div class="invalid-token">Invalid or expired reset link. <a href="/publishers/forgot-password" class="link">Request a new one →</a></div>';
}

async function handleReset(e) {
  e.preventDefault();
  const pw = document.getElementById('f-password').value;
  const cf = document.getElementById('f-confirm').value;
  const errEl = document.getElementById('form-error');
  const btn = document.getElementById('submit-btn');
  errEl.style.display = 'none';
  if (pw !== cf) {
    errEl.textContent = 'Passwords do not match.';
    errEl.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Updating…';
  try {
    const res = await fetch('/api/publishers/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, password: pw })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      window.location.href = '/publishers/login?updated=1';
    } else {
      errEl.textContent = data.error || 'Could not reset password. The link may have expired.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Set new password';
    }
  } catch(err) {
    errEl.textContent = 'Could not connect. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Set new password';
  }
}
</script>
</body>
</html>
